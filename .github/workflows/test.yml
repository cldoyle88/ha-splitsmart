name: Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package with test extras
        run: pip install -e ".[test]"

      # pytest-homeassistant-custom-component imports fcntl (POSIX-only) so it
      # cannot be installed on Windows. It lives here rather than in
      # pyproject.toml [test] so local Windows dev still works without it.
      - name: Install pytest-homeassistant-custom-component (Linux only)
        run: pip install pytest-homeassistant-custom-component

      - name: Lint (ruff check)
        run: ruff check .

      - name: Format (ruff format)
        run: ruff format --check .

      # CI runs the full suite including ha_integration tests. The local
      # pyproject.toml addopts skips them by default (Windows dev flow).
      - name: Run tests
        run: pytest -v --tb=short -m ""

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build (production)
        run: npm run build:prod

      # Bundle-size budget. M2 shipped at ~150 KB; M5 adds five views, two
      # detail sheets, and a column-role-picker component, growing the bundle
      # to ~182 KB. Budget raised to 250 KB for M5; revisit in M7 polish.
      - name: Assert bundle size under 250 KB
        run: |
          size=$(wc -c < ../custom_components/splitsmart/frontend/splitsmart-card.js)
          echo "Bundle size: $size bytes"
          if [ "$size" -gt 256000 ]; then
            echo "Bundle exceeds 250 KB budget"
            exit 1
          fi
